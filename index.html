<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Kit · Hélder Melo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="view-login" class="view">
  <div class="login-bg"></div>
  <div class="login-box">
    <div class="login-marca">
      <div class="login-marca-app"><span class="relevo">Work</span> <span class="brasa">Kit</span></div>
      <div class="login-marca-sub">Hélder Melo · Ferramentas de Projecto</div>
    </div>
    <div class="login-card">
      <div class="login-label">Email</div>
      <input type="email" id="login-email" class="login-input" placeholder="email@exemplo.pt"
             onkeydown="if(event.key==='Enter')window.doLogin()">
      <div class="login-label">Palavra-passe</div>
      <input type="password" id="login-pass" class="login-input" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')window.doLogin()">
      <button class="login-btn" onclick="window.doLogin()">Entrar</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>
</div>

<!-- ══ APP PRINCIPAL ══ -->
<div id="view-app" class="view">

  <!-- Header fixo -->
  <header class="app-header">
    <div class="app-header-left">
      <div class="app-logo"><span class="relevo">Work</span> <span class="brasa">Kit</span></div>
      <div class="app-logo-sub">Hélder Melo</div>
    </div>
    <nav class="app-nav" id="app-nav">
      <button class="nav-tab active" data-tab="tampos" onclick="window.switchTab('tampos',this)">
        🪨 Tampos
      </button>
      <button class="nav-tab" data-tab="eletros" onclick="window.switchTab('eletros',this)">
        ⚡ Eletros
      </button>
      <button class="nav-tab" data-tab="materiais" onclick="window.switchTab('materiais',this)">
        📦 Materiais
      </button>
      <button class="nav-tab" data-tab="maoobra" onclick="window.switchTab('maoobra',this)">
        🔨 Mão de Obra
      </button>
    </nav>
    <div class="app-header-right">
      <span class="app-sync" id="app-sync"></span>
      <button class="app-logout" onclick="window.doLogout()">Sair</button>
    </div>
  </header>

  <!-- Conteúdo das tabs -->
  <main class="app-body">

    <!-- ── TAB: TAMPOS ── -->
    <div class="tab-content active" id="tab-tampos">
      <div id="tampo-header"></div>
      <div id="tampo-body"></div>
    </div>

    <!-- ── TAB: ELETROS ── -->
    <div class="tab-content" id="tab-eletros">
      <div id="eletro-header"></div>
      <div id="eletro-body"></div>
    </div>

    <!-- ── TAB: MATERIAIS ── -->
    <div class="tab-content" id="tab-materiais">
      <div id="mat-header"></div>
      <div id="mat-grid"></div>
    </div>

    <!-- ── TAB: MÃO DE OBRA ── -->
    <div class="tab-content" id="tab-maoobra">
      <div class="mo-lembrete">
        <span>⚠️</span>
        <div>
          <span class="mo-lembrete-label">LEMBRETE INTERNO</span>
          <span class="mo-lembrete-cod">49014163</span>
          <span class="mo-lembrete-desc">— Pedido de Produto para Instalação · Obrigatório em todos os pedidos com instalação</span>
        </div>
        <button class="mo-lembrete-copiar" onclick="window.copiarTexto('49014163',this)">⎘ Copiar</button>
      </div>
      <div class="page-header page-header-flex" style="margin-top:16px">
        <div>
          <div class="page-titulo">Mão de Obra</div>
          <div class="page-sub">Serviços, preços e códigos LM</div>
        </div>
        <button class="btn-pri" id="btn-mo-orc" onclick="window.moTogglePainel()">
          🔨 Orçamento <span id="badge-mo" style="display:none" class="badge-pill"></span>
        </button>
      </div>
      <div class="mo-cats" id="mo-cats"></div>
      <div class="mo-lista" id="mo-lista"></div>
      <!-- Painel de orçamento MO -->
      <div class="painel-lateral" id="mo-painel" style="display:none">
        <div class="painel-header">
          <div class="painel-titulo">Orçamento Mão de Obra</div>
          <button class="painel-fechar" onclick="window.moTogglePainel()">×</button>
        </div>
        <div class="painel-body" id="mo-painel-body"></div>
      </div>
    </div>

  </main>
</div>

<!-- ══ TOAST ══ -->
<div class="wk-toast" id="wk-toast"></div>

<script type="module" src="main.js"></script>
</body>
</html>
